# Build the package-local TypeScript API docs artifact for GitHub Pages.
# The shared graphrefly.dev shell links out to https://ts.graphrefly.dev/.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "demos/**"
      - "packages/ts/src/**"
      - "packages/ts/package.json"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ASTRO_SITE_URL: "https://ts.graphrefly.dev"
  ASTRO_BASE_PATH: "/"
  TS_DOCS_BASE_PATH: "/"
  TS_DOCS_CUSTOM_DOMAIN: "ts.graphrefly.dev"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack install

      - run: pnpm install --frozen-lockfile

      # Build only the package-local TypeScript docs artifact. The shared public website
      # shell is owned by graphrefly under D563.
      - name: Build TypeScript docs artifact
        run: pnpm run docs:build
        env:
          # Keep the package declaration worker on the release workflow's
          # already-proven heap budget.
          NODE_OPTIONS: --max-old-space-size=6144

      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
