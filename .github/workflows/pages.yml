# Deploy Starlight docs to GitHub Pages (custom domain: graphrefly.dev).
# Repo → Settings → Pages → Build: GitHub Actions (first run may require approval).

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "demos/**"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack install

      - run: pnpm install --frozen-lockfile

      # docs:build = website + demos/{compat-matrix,reactive-layout,knowledge-graph}, copied into website/dist/demos/
      - name: Build docs and demos
        run: pnpm run docs:build
        env:
          ASTRO_SITE_URL: https://graphrefly.dev
          ASTRO_BASE_PATH: /

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
