# Build the package-local /ts API docs artifact for GitHub Pages.
# The shared graphrefly.dev shell delegates TypeScript API docs to this route.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "demos/**"
      - "packages/ts/src/**"
      - "packages/ts/package.json"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack install

      - run: pnpm install --frozen-lockfile

      # Build only the package-local /ts artifact. The shared public website
      # shell is owned by graphrefly under D563.
      - name: Build TypeScript docs artifact
        run: pnpm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
